<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Artista</title>
    <link rel="stylesheet" href= "artists.css">
</head>
<body>

    <header>
    <div class="perfil-container">
        <img id="perfil" src="sprites/avatar/AsepSyf.png" alt="Foto de Perfil">
        <h1>AsepSyf</h1>
    </div>
    </header>

    <main>
        <div id="galeria-grid" class="grid-container"></div>
    </main>


    <script>
        // Lista os nomes dos arquivos que estão na mesma pasta do head.gif ou dentro dela
        const desenhos = [
            "acid_runner",
            "americana_1_777",
            "bearhole",
            "bitfoot",
            "cooltech_v144",
            "deep_cryptospace",
            "deepstar",
            "devils_carnival",
            "eva_runner",
            "fallout_finder_55",
            "flux_capacitor_gate",
            "gtaminator",
            "ignite_runner",
            "infinitymine",
            "infinitymine_lite",
            "infinitymine_ultra",
            "liberty_digger",
            "mechaflytrap",
            "merry_dancers",
            "migrant_fleet",
            "naturez",
            "nebulae_terror",
            "nebulla",
            "perfectly_balanced",
            "polartech_v51",
            "quantumcrawler",
            "radiosummer",
            "rebirth_rover",
            "redspace",
            "renewal_runner",
            "scarlet_runner",
            "shopspace",
            "signal_spark",
            "stoneguardian",
            "sun_kissed_shores",
            "sunminer_r2",
            "sunseeker",
            "sunset_bay_m_23",
            "sunset_city_m_23",
            "the_last_bonfire",
            "void_herald",
            "x_play",
        ];

        const galeria = document.getElementById('galeria-grid');

        desenhos.forEach(arquivo => {
            const img = document.createElement('img');
            // Caminho relativo para a pasta dos desenhos
            img.src = `sprites/asepsyf/${arquivo}.gif`;
            img.alt = "Desenho";
            galeria.appendChild(img);
        });
    </script>
</body>
</html>
