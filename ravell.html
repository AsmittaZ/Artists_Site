<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Artista</title>
    <link rel="stylesheet" href= "artists.css">
</head>
<body>

    <header>
        <img id="perfil" src="sprites/avatar/Ravell.png" alt="Foto de Perfil">
        <h1 class="name">Ravell</h1>
        
        <audio id="musica-perfil" controls loop>
            <source src="audio/music.mp3" type="audio/mpeg">
        </audio>
    </header>

    <main>
        <div id="galeria-grid" class="grid-container"></div>
    </main>

    <script>
        const audio = document.getElementById('musica-perfil');
        audio.volume = 0.5;

        // Tenta tocar ao interagir com a página
        const playAudio = () => {
            audio.play().then(() => {
                window.removeEventListener('click', playAudio);
                window.removeEventListener('touchstart', playAudio);
            }).catch(error => console.log("Autoplay bloqueado"));
        };

        window.addEventListener('load', playAudio);
        window.addEventListener('click', playAudio);
        window.addEventListener('touchstart', playAudio);
        // Lista os nomes dos arquivos que estão na mesma pasta do head.gif ou dentro dela
        const desenhos = [
           "1bit-dj-bone",
            "1bit-skleton-disco",
            "ancient-apache",
            "ancient-maori",
            "ancient-zeus",
            "fury-biker",
            "fury-blinker",
            "fury-road",
            "fury-techno-worm",
            "hightech",
            "hightech-golden-vein",
            "machine-blueprint",
            "machine-candy-factory",
            "machine-turbine-strangler",
            "machine-turbo-snail",
            "miami",
            "miami-car",
            "miami-city",
            "myth-cerberus",
            "myth-fairy",
            "myth-uroboros",
            "paradise-coconut",
            "paradise-hammock",
            "retroui-solitaire",
            "rich-doge",
            "rich-golden-mask",
            "rich-one-dollar",
        ];

        const galeria = document.getElementById('galeria-grid');

        desenhos.forEach(arquivo => {
            const img = document.createElement('img');
            // Caminho relativo para a pasta dos desenhos
            img.src = `sprites/ravell/${arquivo}.gif`;
            img.alt = "Desenho";
            galeria.appendChild(img);
        });
    </script>
</body>
</html>
