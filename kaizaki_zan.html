<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Artista</title>
    <link rel="stylesheet" href= "artists.css">
</head>
<body>

    <header>
        <img id="perfil" src="sprites/avatar/Kaizaki_Zan.png" alt="Foto de Perfil">
        <h1 class="name">Kaizaki Zan</h1>
        
        <audio id="musica-perfil" controls loop>
            <source src="audio/music.mp3" type="audio/mpeg">
        </audio>
    </header>

    <main>
        <div id="galeria-grid" class="grid-container"></div>
    </main>

    <script>
        const audio = document.getElementById('musica-perfil');
        audio.volume = 0.5;

        // Tenta tocar ao interagir com a página
        const playAudio = () => {
            audio.play().then(() => {
                window.removeEventListener('click', playAudio);
                window.removeEventListener('touchstart', playAudio);
            }).catch(error => console.log("Autoplay bloqueado"));
        };

        window.addEventListener('load', playAudio);
        window.addEventListener('click', playAudio);
        window.addEventListener('touchstart', playAudio);
        // Lista os nomes dos arquivos que estão na mesma pasta do head.gif ou dentro dela
        const desenhos = [
            "signal_bean", 
            "pop_up_hell", 
            "furnacer", 
            "zeus", 
            "full_outrage", 
            "break_point", 
            "calm_before", 
            "dragon_shrine", 
            "don_skullini", 
            "tidal_tyrant", 
            "the_bust", 
            "stormcaller", 
            "festive_triumph", 
            "mystery_forge", 
            "giftchain", 
            "rudolph_the_camel", 
            "palmpilot", 
            "neonguerilla", 
            "booo!", 
            "quantumcore_x_9", 
            "crypto_bretzel", 
            "brushnpalette", 
            "pink_glazer", 
            "communitycatalyst", 
            "pioneerica_19", 
            "pit_boss", 
            "cococrab_shore", 
            "nuclearburg", 
            "chemdose_55", 
            "biogauge_67", 
            "toxifilter_99", 
            "apollo_miner", 
            "crypto_combo", 
            "home_run_hasher", 
            "gingerbread_house"
        ];

        const galeria = document.getElementById('galeria-grid');

        desenhos.forEach(arquivo => {
            const img = document.createElement('img');
            // Caminho relativo para a pasta dos desenhos
            img.src = `sprites/kaizaki_zan/${arquivo}.gif`;
            img.alt = "Desenho";
            galeria.appendChild(img);
        });
    </script>
</body>
</html>
