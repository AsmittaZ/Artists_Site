<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Artista</title>
    <link rel="stylesheet" href= "artists.css">
</head>
<body>

    <header>
        <img id="perfil" src="sprites/avatar/Andando.png" alt="Foto de Perfil">
        <h1>Andando</h1>
    </header>

    <main>
        <div id="galeria-grid" class="grid-container"></div>
    </main>

    <script>
        // Lista os nomes dos arquivos que estão na mesma pasta do head.gif ou dentro dela
        const desenhos = [
            "Desert_Drifter",
            "Thunderdome_Tinkerer",
            "Breezy_Bay",
            "neonblaze",
            "boogieman",
            "batty",
            "muerte_miner",
            "acient_ice",
            "Chillbear",
            "nordic_winter",
            "icy_souse",
            "frostgun",
            "Mammeth",
            "Doge_miner",
            "elemental",
            "faraon",
            "venus",
            "Drum'n'mine",
            "conga",
            "web4map",
            "80-days",
            "Storm-pierser",
            "Stonks",
            "RollerAdminGauntlet",
            "Zombiner",
            "devourer_of_world",
            "lord_of_dread",
            "hollypaca",
            "festive_panda",
            "starry_hash",
            "cubist_code",
            "gold_zodiac",
            "Dark_zodiac",
            "Zodiac",
            "Chimera",
            "Roller_Patricks",
            "Uncle3",
            "Uncle_wine",
            "rosseta's_code",
            "on_air",
            "sarcophagist_express",
            "bullet_bills",
            "retroload",
            "endurance_engine",
            "chef_is_watching",
            "no_turning_back",
            "dont_get_wet",
            "power_detonator",
            "jaeger_heart",
            "vintage",
            "birdwatch_tent",
        ];

        const galeria = document.getElementById('galeria-grid');

        desenhos.forEach(arquivo => {
            const img = document.createElement('img');
            // Caminho relativo para a pasta dos desenhos
            img.src = `sprites/andando/${arquivo}.gif`;
            img.alt = "Desenho";
            galeria.appendChild(img);
        });
    </script>
</body>
</html>
