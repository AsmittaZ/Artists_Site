<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Perfil do Artista</title>
    <link rel="stylesheet" href= "artists.css">
</head>
<body>

    <header>
    <div class="perfil-container">
        <img id="perfil" src="sprites/avatar/Kimbofi.png" alt="Foto de Perfil">
        <h1>Kimbofi</h1>
    </div>
    </header>

    <main>
        <div id="galeria-grid" class="grid-container"></div>
    </main>


    <main>
        <div id="galeria-grid" class="grid-container"></div>
    </main>

    <script>
        // Lista os nomes dos arquivos que estão na mesma pasta do head.gif ou dentro dela
        const desenhos = [
            "1Little_Prancer",
            "2Blitzen_Jr",
            "3Winter_Herald",
            "50_Shades_of_Uncle",
            "Crypto_Rose",
            "Crypto_Train",
            "Cursed_Ring",
            "Emerald_Creature",
            "HamScan",
            "Hamsters_Team",
            "Henry's_Honor",
            "Illusion_Miner",
            "Neon_Spill",
            "Overheat_Blower",
            "Slyhamrin's_Gaze",
            "Taurus",
            "The_Hamfather",
            "The_Imperial_Eggs",
            "The_Pawfather",

        ];

        const galeria = document.getElementById('galeria-grid');

        desenhos.forEach(arquivo => {
            const img = document.createElement('img');
            // Caminho relativo para a pasta dos desenhos
            img.src = `sprites/kimbofi/${arquivo}.gif`;
            img.alt = "Desenho";
            galeria.appendChild(img);
        });
    </script>
</body>
</html>
