<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Artista</title>
    <link rel="stylesheet" href= "artists.css">
</head>
<body>

    <header>
        <img id="perfil" src="sprites/avatar/PetterCh.png" alt="Foto de Perfil">
        <h1 class="name">PetterCH</h1>
        
        <audio id="musica-perfil" controls loop>
            <source src="audio/asmita-palle-yellow.mp3" type="audio/mpeg">
        </audio>
    </header>

    <main>
        <div id="galeria-grid" class="grid-container"></div>
    </main>

    <script>
        const audio = document.getElementById('musica-perfil');
        audio.volume = 0.5;

        // Tenta tocar ao interagir com a página
        const playAudio = () => {
            audio.play().then(() => {
                window.removeEventListener('click', playAudio);
                window.removeEventListener('touchstart', playAudio);
            }).catch(error => console.log("Autoplay bloqueado"));
        };

        window.addEventListener('load', playAudio);
        window.addEventListener('click', playAudio);
        window.addEventListener('touchstart', playAudio);
        // Lista os nomes dos arquivos que estão na mesma pasta do head.gif ou dentro dela
        const desenhos = [
            "the_minercracker",
            "helltaurus",
            "blaze_boosted",
            "tamborim",
            "smelt_smith",
            "dust_daredevil",
            "road_trip_to_hell",
            "little_boxes",
            "eclipse_elegance",
            "bloody_mary",
            "cryptoworld",
            "the_nirvana",
            "redstar_x",
            "the_cube",
            "plasmajet_dynamo",
            "pumpkin_king",
            "omninexus",
            "frosttech_v135",
            "tusk_gun",
            "last_defender",
            "reality_miner",
            "pennywises_haunt",
            "abyssal_lord",
            "capricorn",
            "binglong_wyrm",
            "razorblade",
            "hoarders_wealth",
            "vaults_chalice",
            "silver_valor",
            "twin_serpent",
            "shaolin_temple",
            "cryostone_relic",
            "inked_memory",
        ];

        const galeria = document.getElementById('galeria-grid');

        desenhos.forEach(arquivo => {
            const img = document.createElement('img');
            // Caminho relativo para a pasta dos desenhos
            img.src = `sprites/petterch/${arquivo}.gif`;
            img.alt = "Desenho";
            galeria.appendChild(img);
        });
    </script>
</body>
</html>
