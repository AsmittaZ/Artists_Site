<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Artista</title>
    <link rel="stylesheet" href= "artists.css">
</head>
<body>

    <header>
        <img id="perfil" src="sprites/avatar/Asmita.png" alt="Foto de Perfil">
        <h1 class="name">Asmita</h1>
        
        <audio id="musica-perfil" controls loop>
            <source src="audio/ds-edited.mp3" type="audio/mpeg">
        </audio>
    </header>

    <main>
        <div id="galeria-grid" class="grid-container"></div>
    </main>

    <script>
        const audio = document.getElementById('musica-perfil');
        audio.volume = 0.5;

        // Tenta tocar ao interagir com a página
        const playAudio = () => {
            audio.play().then(() => {
                window.removeEventListener('click', playAudio);
                window.removeEventListener('touchstart', playAudio);
            }).catch(error => console.log("Autoplay bloqueado"));
        };

        window.addEventListener('load', playAudio);
        window.addEventListener('click', playAudio);
        window.addEventListener('touchstart', playAudio);
        const desenhos = [
            "virgo",
            "Breathtaking",
            "armag",
            "bonsai1",
            "British_Moai",
            "camer",
            "cap_patria",
            "Car",
            "Carnaval_Brasil",
            "charge",
            "chuky",
            "coffe",
            "Dark Energy",
            "doumpa2",
            "dragon",
            "Dragon_Wing",
            "elf",
            "fire",
            "globo",
            "halloween",
            "hamafia",
            "hamax",
            "hestia",
            "iglu",
            "kinetic_energy",
            "maleta-",
            "mecha_",
            "Metroid",
            "miami_city",
            "Milano2",
            "mind",
            "miner",
            "mluck",
            "muttley ",
            "Nuclear_Energy",
            "obsidian",
            "oktober",
            "palm",
            "Palm2",
            "plasma_rifle",
            "polar",
            "raid",
            "robo_astro",
            "Sagittarius",
            "sakura",
            "sakura2",
            "sakura3",
            "sax",
            "Sound_Energy",
            "tatu",
            "tec",
            "Thermal_energy",
            "Uranus",
            "violin",
            "warhamer"
          

            // Adicione os próximos desenhos aqui, ex: "desenho2.gif", "desenho3.png"
        ];

        const galeria = document.getElementById('galeria-grid');

        desenhos.forEach(arquivo => {
            const img = document.createElement('img');
            // Caminho relativo para a pasta dos desenhos
            img.src = `sprites/asmita/${arquivo}.gif`;
            img.alt = "Desenho";
            galeria.appendChild(img);
        });
    </script>
</body>
</html>
